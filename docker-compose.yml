version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: quizzard_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-quizzard_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-quizzard_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: quizzard_bot
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./src:/app/src   # для разработки (горячая перезагрузка)
      - ./alembic:/app/alembic
    # для продакшена закомментировать volumes с src

volumes:
  pg_data: